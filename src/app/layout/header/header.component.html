<header class="app-header">
  <div class="header-left">
    <button class="toggle-btn" (click)="onToggle()" title="Toggle sidebar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <span class="date-label">{{ today | date:'EEEE, d MMMM yyyy' }}</span>
  </div>

  <div class="header-right">
    <!-- Role badge -->
    <span class="role-badge" *ngIf="auth.isAdmin()">
      <svg viewBox="0 0 16 16" fill="currentColor" width="11"><path d="M8 1a2 2 0 012 2v1h1a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2V6a2 2 0 012-2h1V3a2 2 0 012-2zm0 1a1 1 0 00-1 1v1h2V3a1 1 0 00-1-1z"/></svg>
      ADMIN
    </span>

    <div class="header-divider"></div>

    <!-- User menu -->
    <div class="header-user" (click)="showUserMenu = !showUserMenu" [class.active]="showUserMenu">
      <div class="header-avatar">{{ userInitials }}</div>
      <div class="header-user-info">
        <span class="header-user-name">{{ userName }}</span>
        <span class="header-user-role">{{ auth.userRole() }}</span>
      </div>
      <svg class="chevron" viewBox="0 0 20 20" fill="currentColor" width="14" [class.rotated]="showUserMenu">
        <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd"/>
      </svg>
    </div>

    <!-- Dropdown -->
    <div class="user-dropdown" *ngIf="showUserMenu" (click)="showUserMenu = false">
      <div class="dropdown-info">
        <div class="dropdown-avatar">{{ userInitials }}</div>
        <div>
          <div class="dropdown-name">{{ userName }}</div>
          <div class="dropdown-email">{{ userEmail }}</div>
        </div>
      </div>
      <div class="dropdown-divider"></div>
      <button class="dropdown-item danger" (click)="logout()">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" width="16">
          <path d="M13 7l5 5-5 5M18 12H8M8 3H5a2 2 0 00-2 2v10a2 2 0 002 2h3"/>
        </svg>
        Se déconnecter
      </button>
    </div>
  </div>
</header>

<!-- Overlay to close dropdown -->
<div class="dropdown-overlay" *ngIf="showUserMenu" (click)="showUserMenu = false"></div>
