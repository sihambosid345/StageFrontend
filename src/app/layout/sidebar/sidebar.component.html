<aside class="sidebar" [class.collapsed]="collapsed">

  <!-- Logo + Toggle -->
  <div class="sidebar-logo" (click)="toggleCollapse()" title="Réduire / Développer">
    <div class="logo-icon">
      <svg viewBox="0 0 36 36" fill="none">
        <path d="M6 28V18l12-9 12 9v10" stroke="#93c5fd" stroke-width="2.2" stroke-linecap="round"/>
        <rect x="13" y="21" width="5" height="7" rx="1" fill="#93c5fd" opacity="0.9"/>
        <rect x="20" y="17" width="7" height="3.5" rx="1" fill="#93c5fd" opacity="0.45"/>
      </svg>
    </div>
    <span class="logo-text" *ngIf="!collapsed"><strong>HR</strong>Matrix</span>
    <i class="bi bi-chevron-left toggle-chevron" *ngIf="!collapsed"></i>
    <i class="bi bi-chevron-right toggle-chevron" *ngIf="collapsed"></i>
  </div>

  <!-- Nav -->
  <nav class="sidebar-nav">
    <ul>
      <ng-container *ngFor="let item of navItems">
        <li *ngIf="isVisible(item)"
            [class.has-children]="item.children"
            [class.expanded]="item.expanded">

          <!-- Direct link -->
          <a *ngIf="!item.children"
             [routerLink]="item.route"
             routerLinkActive="active"
             class="nav-item"
             [title]="collapsed ? item.label : ''">
            <i class="bi {{ item.icon }} nav-icon-bi"></i>
            <span class="nav-label" *ngIf="!collapsed">{{ item.label }}</span>
          </a>

          <!-- Group toggle -->
          <button *ngIf="item.children"
                  class="nav-item nav-group-toggle"
                  (click)="toggleGroup(item)"
                  [title]="collapsed ? item.label : ''">
            <i class="bi {{ item.icon }} nav-icon-bi"></i>
            <span class="nav-label" *ngIf="!collapsed">{{ item.label }}</span>
            <span class="nav-arrow" *ngIf="!collapsed" [class.rotated]="item.expanded">
              <i class="bi bi-chevron-down"></i>
            </span>
          </button>

          <!-- Children -->
          <ul class="nav-children" *ngIf="item.children && (item.expanded || collapsed)">
            <ng-container *ngFor="let child of visibleChildren(item)">
              <li>
                <a [routerLink]="child.route"
                   routerLinkActive="active"
                   class="nav-item nav-child"
                   [title]="child.label">
                  <i class="bi {{ child.icon }} nav-icon-bi"></i>
                  <span class="nav-label" *ngIf="!collapsed">{{ child.label }}</span>
                </a>
              </li>
            </ng-container>
          </ul>

        </li>
      </ng-container>
    </ul>
  </nav>

  <!-- Footer -->
  <div class="sidebar-footer" *ngIf="!collapsed">
    <div class="user-info">
      <div class="user-avatar">{{ userInitials }}</div>
      <div class="user-details">
        <span class="user-name">{{ userName }}</span>
        <span class="user-role">{{ userRole }}</span>
      </div>
    </div>
  </div>

</aside>
