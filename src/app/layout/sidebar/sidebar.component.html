<aside class="sidebar" [class.collapsed]="collapsed">
  <div class="sidebar-logo">
    <div class="logo-icon">
      <svg viewBox="0 0 36 36" fill="none">
        <rect width="36" height="36" rx="10" fill="url(#g1)"/>
        <path d="M10 26V16l8-6 8 6v10" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
        <rect x="14" y="19" width="4" height="7" rx="1" fill="#fff" opacity="0.9"/>
        <rect x="20" y="15" width="6" height="3" rx="1" fill="#fff" opacity="0.6"/>
        <defs>
          <linearGradient id="g1" x1="0" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse">
            <stop stop-color="#6366f1"/>
            <stop offset="1" stop-color="#8b5cf6"/>
          </linearGradient>
        </defs>
      </svg>
    </div>
    <span class="logo-text" *ngIf="!collapsed">
      <strong>HR</strong>Matrix
    </span>
  </div>

  <nav class="sidebar-nav">
    <ul>
      <li *ngFor="let item of navItems" [class.has-children]="item.children" [class.expanded]="item.expanded">

        <!-- Direct link -->
        <a *ngIf="!item.children" [routerLink]="item.route" routerLinkActive="active"
           class="nav-item" [title]="collapsed ? item.label : ''">
          <span class="nav-icon" [innerHTML]="getIcon(item.icon)"></span>
          <span class="nav-label" *ngIf="!collapsed">{{ item.label }}</span>
        </a>

        <!-- Group toggle -->
        <button *ngIf="item.children" class="nav-item nav-group-toggle"
                (click)="toggleGroup(item)" [title]="collapsed ? item.label : ''">
          <span class="nav-icon" [innerHTML]="getIcon(item.icon)"></span>
          <span class="nav-label" *ngIf="!collapsed">{{ item.label }}</span>
          <span class="nav-arrow" *ngIf="!collapsed" [class.rotated]="item.expanded">
            <svg viewBox="0 0 20 20" fill="currentColor" width="14"><path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
          </span>
        </button>

        <!-- Children -->
        <ul class="nav-children" *ngIf="item.children && (item.expanded || collapsed)">
          <li *ngFor="let child of item.children">
            <a [routerLink]="child.route" routerLinkActive="active"
               class="nav-item nav-child" [title]="child.label">
              <span class="nav-icon" [innerHTML]="getIcon(child.icon)"></span>
              <span class="nav-label" *ngIf="!collapsed">{{ child.label }}</span>
            </a>
          </li>
        </ul>
      </li>
    </ul>
  </nav>

  <div class="sidebar-footer" *ngIf="!collapsed">
    <div class="user-info">
      <div class="user-avatar">A</div>
      <div class="user-details">
        <span class="user-name">Administrateur</span>
        <span class="user-role">Super Admin</span>
      </div>
    </div>
  </div>
</aside>
