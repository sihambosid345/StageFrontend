<div class="login-shell">
  <!-- Left panel — branding -->
  <div class="login-brand">
    <div class="brand-content">
      <div class="brand-logo">
        <svg viewBox="0 0 48 48" fill="none">
          <rect width="48" height="48" rx="14" fill="url(#lg1)"/>
          <path d="M13 34V22l11-8 11 8v12" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
          <rect x="19" y="25" width="6" height="9" rx="1.5" fill="#fff" opacity="0.95"/>
          <rect x="27" y="20" width="7" height="4" rx="1" fill="#fff" opacity="0.6"/>
          <defs>
            <linearGradient id="lg1" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
              <stop stop-color="#6366f1"/>
              <stop offset="1" stop-color="#8b5cf6"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <h1 class="brand-name"><strong>HR</strong>Matrix</h1>
      <p class="brand-tagline">Plateforme de gestion des ressources humaines</p>

      <div class="brand-features">
        <div class="feature-item">
          <div class="feature-dot"></div>
          <span>Gestion complète des employés</span>
        </div>
        <div class="feature-item">
          <div class="feature-dot"></div>
          <span>Paie & bulletins de salaire</span>
        </div>
        <div class="feature-item">
          <div class="feature-dot"></div>
          <span>Suivi des présences & contrats</span>
        </div>
        <div class="feature-item">
          <div class="feature-dot"></div>
          <span>Rapports & tableaux de bord</span>
        </div>
      </div>
    </div>

    <div class="brand-decoration">
      <div class="deco-circle deco-1"></div>
      <div class="deco-circle deco-2"></div>
      <div class="deco-circle deco-3"></div>
    </div>
  </div>

  <!-- Right panel — form -->
  <div class="login-panel">
    <div class="login-card">
      <div class="login-header">
        <h2>Connexion</h2>
        <p>Accédez à votre espace administrateur</p>
      </div>

      <!-- Error message -->
      <div class="login-error" *ngIf="error()">
        <svg viewBox="0 0 20 20" fill="currentColor" width="16">
          <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
        </svg>
        {{ error() }}
      </div>

      <div class="login-form">
        <!-- Email -->
        <div class="field-group">
          <label for="email">Adresse email</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" width="18">
              <path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"/>
              <path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"/>
            </svg>
            <input
              id="email"
              type="email"
              [(ngModel)]="email"
              placeholder="admin@exemple.com"
              (keydown)="onKeydown($event)"
              autocomplete="email"
            />
          </div>
        </div>

        <!-- Password -->
        <div class="field-group">
          <label for="password">Mot de passe</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" width="18">
              <path d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z"/>
            </svg>
            <input
              id="password"
              [type]="showPass ? 'text' : 'password'"
              [(ngModel)]="password"
              placeholder="••••••••"
              (keydown)="onKeydown($event)"
              autocomplete="current-password"
            />
            <button class="toggle-pass" type="button" (click)="showPass = !showPass" tabindex="-1">
              <svg *ngIf="!showPass" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" width="17">
                <path d="M10 12a2 2 0 100-4 2 2 0 000 4z"/>
                <path d="M2 10s3-6 8-6 8 6 8 6-3 6-8 6-8-6-8-6z"/>
              </svg>
              <svg *ngIf="showPass" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" width="17">
                <path d="M3 3l14 14M10 12a2 2 0 01-2-2m4.93-.07A2 2 0 0110 12M2 10s1.2-2.4 3.5-4M17.5 7A11.7 11.7 0 0118 10s-3 6-8 6a7.4 7.4 0 01-3-.6"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Submit -->
        <button
          class="login-btn"
          (click)="submit()"
          [disabled]="loading()"
        >
          <span *ngIf="!loading()">Se connecter</span>
          <span *ngIf="loading()" class="btn-loading">
            <svg class="spin" viewBox="0 0 24 24" fill="none" width="18">
              <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" stroke-dasharray="31.4" stroke-dashoffset="10"/>
            </svg>
            Connexion...
          </span>
        </button>
      </div>

      <div class="login-footer">
        <span>Accès réservé aux administrateurs autorisés</span>
      </div>
    </div>
  </div>
</div>
